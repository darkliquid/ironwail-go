[env]
TIMEOUT = "5"

[tools]
go = "1.26"
golangci-lint = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Helper task - not meant to be run directly
[tasks.go-run]
description = "Run the ironwailgo binary (internal task)"
hide = true
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
CGO_ENABLED=0 go run -tags gogpu,audio_oto ./cmd/ironwailgo -basedir "${QUAKE_DIR}"
"""

[tasks.clean-logs]
description = "Remove smoke test log files"
run = "rm -f smoke-*.log"

[tasks.smoke-menu]
description = "Smoke test: verify GoGPU menu startup works"
depends = ["clean-logs", "build-gogpu"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
timeout ${TIMEOUT} ./ironwailgo-wgpu -basedir "${QUAKE_DIR}" 2>&1 | tee smoke-menu.log || true
grep "Starting render loop" smoke-menu.log
grep "FS mounted" smoke-menu.log
grep "QC loaded" smoke-menu.log
grep "menu active" smoke-menu.log
grep "frame loop started" smoke-menu.log
"""

[tasks.smoke-headless]
description = "Smoke test: verify headless mode works from the GoGPU build"
depends = ["clean-logs", "build-gogpu"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
timeout ${TIMEOUT} ./ironwailgo-wgpu -basedir "${QUAKE_DIR}" -headless 2>&1 | tee smoke-headless.log || true
grep "FS mounted" smoke-headless.log
grep "QC loaded" smoke-headless.log
grep "menu active" smoke-headless.log
grep "frame loop started" smoke-headless.log
"""

[tasks.smoke-map-start]
description = "Smoke test: verify GoGPU map spawning works"
depends = ["clean-logs", "build-gogpu"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
timeout ${TIMEOUT} ./ironwailgo-wgpu -basedir "${QUAKE_DIR}" +map start 2>&1 | tee smoke-map-start.log || true
grep "Starting render loop" smoke-map-start.log
grep "FS mounted" smoke-map-start.log
grep "QC loaded" smoke-map-start.log
grep "menu active" smoke-map-start.log
grep "map spawn started" smoke-map-start.log
grep "map spawn finished" smoke-map-start.log
grep "client active" smoke-map-start.log
grep "frame loop started" smoke-map-start.log
"""

[tasks.smoke-all]
description = "Run all smoke tests"
depends = [
  "smoke-menu",
  "smoke-headless",
  "smoke-map-start",
]

[tasks.ralph-analyze-log]
description = "Analyze a telemetry log into Ralph task records"
run = """
mkdir -p .ralph
go run ./tools/ralph analyze-log \
  --log "${RALPH_LOG:-test.log}" \
  --summary "${RALPH_SUMMARY:-.ralph/latest-summary.json}" \
  --tasks "${RALPH_TASKS:-.ralph/latest-task-records.json}" \
  --state "${RALPH_STATE:-.ralph/state.json}" \
  --beads-sync "${RALPH_BEADS_SYNC:-.ralph/latest-beads-sync.json}" \
  $(if [ "${RALPH_APPLY_BEADS:-0}" = "1" ]; then printf '%s' '--apply-beads'; fi) \
  --beads-binary "${RALPH_BEADS_BIN:-bd}"
"""

[tasks.ralph-build-prompt]
interactive = true
description = "Build a Copilot prompt from Ralph summary/task artifacts"
run = """
mkdir -p .ralph
go run ./tools/ralph build-prompt \
  --summary "${RALPH_SUMMARY:-.ralph/latest-summary.json}" \
  --tasks "${RALPH_TASKS:-.ralph/latest-task-records.json}" \
  --log "${RALPH_LOG:-.ralph/latest.log}" \
  --output "${RALPH_PROMPT_PATH:-.ralph/latest-copilot-prompt.txt}" \
  --max-tasks "${RALPH_COPILOT_MAX_TASKS:-5}"
"""

[tasks.ralph-loop-once]
interactive = true
description = "Run one telemetry/analyze/fix Ralph iteration"
depends = ["build-gogpu"]
run = "go run ./tools/ralph loop once"

[tasks.ralph-loop]
interactive = true
description = "Continuously run the telemetry-driven Ralph parity/fix loop"
depends = ["build-gogpu"]
run = "go run ./tools/ralph loop continuous"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.verify]
description = "Run core verification suite"
depends = ["test", "build-gogpu"]

[tasks.build-qgo]
depends = ["go-generate"]
description = "Build the QGo compiler"
run = "CGO_ENABLED=0 go build ./cmd/qgo"

[tasks.build-progs]
depends = ["build-qgo"]
description = "Build the progs.dat from QuakeGo sources"
run = "cd pkg/qgo/quakego && ../../../qgo"

[tasks.build-gogpu]
depends = ["go-generate"]
description = "Build binary in WGPU mode"
run = "CGO_ENABLED=0 go build -tags gogpu,audio_oto -o ironwailgo-wgpu ./cmd/ironwailgo"

[tasks.build-gogpu-rust]
depends = ["go-generate"]
description = "Build binary in WGPU mode with rust backend"
run = "CGO_ENABLED=0 go build -tags gogpu,rust,audio_oto -o ironwailgo-wgpu-rust ./cmd/ironwailgo"


[tasks.build-gogpu-sdl3]
depends = ["go-generate"]
description = "Build binary in WGPU mode with SDL3 input/audio (nofakecgo workaround)"
run = "CGO_ENABLED=0 go build -tags 'gogpu sdl3 nofakecgo' -o ironwailgo-wgpu-sdl3 ./cmd/ironwailgo"

[tasks.run-gogpu-sdl3]
depends = ["build-gogpu-sdl3"]
description = "Run WGPU + SDL3 input/audio build"
run = "IW_INPUT_BACKEND=sdl3 ./ironwailgo-wgpu-sdl3 -basedir ${QUAKE_DIR}"

[tasks.run-gogpu]
depends = ["build-gogpu"]
description = "Run GoGPU + oto build"
run = "./ironwailgo-wgpu -basedir ${QUAKE_DIR}"

[tasks.parity-ref]
description = "Capture reference screenshots from C Ironwail"
run = "go run ./tools/parity_screenshots reference"

[tasks.parity-go]
description = "Capture screenshots from the GoGPU parity build"
depends = ["build-gogpu"]
run = "go run ./tools/parity_screenshots go"

[tasks.parity-compare]
description = "Compare reference vs Go screenshots and fail on diffs/missing captures"
run = "go run ./tools/parity_screenshots compare"

[tasks.parity-all]
description = "Capture reference + GoGPU Go screenshots and compare them"
depends = ["build-gogpu"]
run = "go run ./tools/parity_screenshots both"

[tasks.go-generate]
hide = true
description = "Run go generate (internal task)"
run = "go generate ./..."

[tasks.lint]
description = "Run Go linting (golangci-lint + govulncheck)"
run = """
#!/usr/bin/env bash
set -euo pipefail
TMPDIR=/tmp golangci-lint run ./...
TMPDIR=/tmp govulncheck ./...
"""

[tasks.fmt]
description = "Format Go code"
run = "golangci-lint fmt ./..."
