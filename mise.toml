[env]
TIMEOUT = "5"

[tools]
go = "1.26"

# Helper task - not meant to be run directly
[tasks.go-run]
description = "Run the ironwailgo binary (internal task)"
hide = true
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
CGO_ENABLED=1 go run ./cmd/ironwailgo -basedir "${QUAKE_DIR}"
"""

[tasks.clean-logs]
description = "Remove smoke test log files"
run = "rm -f smoke-*.log"

[tasks.smoke-menu]
description = "Smoke test: verify menu loads correctly"
depends = ["clean-logs"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
CGO_ENABLED=0 timeout ${TIMEOUT} go run -tags=gogpu ./cmd/ironwailgo -basedir "${QUAKE_DIR}" 2>&1 | tee smoke-menu.log || true
grep "FS mounted" smoke-menu.log
grep "QC loaded" smoke-menu.log
grep "menu active" smoke-menu.log
grep "frame loop started" smoke-menu.log
"""

[tasks.smoke-headless]
description = "Smoke test: verify headless mode works"
depends = ["clean-logs"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
CGO_ENABLED=0 timeout ${TIMEOUT} go run -tags=gogpu ./cmd/ironwailgo -basedir "${QUAKE_DIR}" -headless 2>&1 | tee smoke-headless.log || true
grep "FS mounted" smoke-headless.log
grep "QC loaded" smoke-headless.log
grep "menu active" smoke-headless.log
grep "frame loop started" smoke-headless.log
"""

[tasks.smoke-map-start]
description = "Smoke test: verify map spawning works"
depends = ["clean-logs"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
export WAYLAND_DISPLAY=
CGO_ENABLED=0 timeout ${TIMEOUT} go run -tags=gogpu ./cmd/ironwailgo -basedir "${QUAKE_DIR}" +map start 2>&1 | tee smoke-map-start.log || true
grep "FS mounted" smoke-map-start.log
grep "QC loaded" smoke-map-start.log
grep "menu active" smoke-map-start.log
grep "map spawn started" smoke-map-start.log
grep "map spawn finished" smoke-map-start.log
grep "client active" smoke-map-start.log
grep "frame loop started" smoke-map-start.log
"""

[tasks.smoke-cgo-map-start]
description = "Smoke test: verify CGO/OpenGL boots to map start without headless fallback"
depends = ["clean-logs", "build-cgo"]
run = """
if [ -z "${QUAKE_DIR:-}" ]; then
  echo "QUAKE_DIR is required" >&2
  exit 1
fi
timeout 8 ./ironwailgo-cgo -basedir "${QUAKE_DIR}" +map start 2>&1 | tee smoke-cgo-map-start.log || true
grep "OpenGL renderer created" smoke-cgo-map-start.log
grep "Starting OpenGL render loop" smoke-cgo-map-start.log
grep "OpenGL world uploaded" smoke-cgo-map-start.log
grep "FS mounted" smoke-cgo-map-start.log
grep "QC loaded" smoke-cgo-map-start.log
grep "menu active" smoke-cgo-map-start.log
grep "map spawn started" smoke-cgo-map-start.log
grep "map spawn finished" smoke-cgo-map-start.log
grep "client active" smoke-cgo-map-start.log
grep "frame loop started" smoke-cgo-map-start.log
if grep -q "Renderer initialization failed. Running in headless mode." smoke-cgo-map-start.log; then
	echo "unexpected renderer init fallback to headless" >&2
	exit 1
fi
if grep -q "Render loop failed. Falling back to headless mode." smoke-cgo-map-start.log; then
	echo "unexpected render-loop fallback to headless" >&2
	exit 1
fi
"""

[tasks.smoke-all]
description = "Run all smoke tests"
depends = ["smoke-menu", "smoke-headless", "smoke-map-start"]

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.verify]
description = "Run core verification suite"
depends = ["test", "build-gogpu", "build-cgo"]

[tasks.build-gogpu]
depends = ["go-generate"]
description = "Build binary in WGPU mode"
run = "CGO_ENABLED=0 go build -tags gogpu -o ironwailgo-wgpu ./cmd/ironwailgo"

[tasks.build-gogpu-sdl3]
depends = ["go-generate"]
description = "Build binary in WGPU mode with SDL3 input/audio (nofakecgo workaround)"
run = "CGO_ENABLED=0 go build -tags 'gogpu sdl3 nofakecgo' -o ironwailgo-wgpu-sdl3 ./cmd/ironwailgo"

[tasks.run-gogpu-sdl3]
depends = ["build-gogpu-sdl3"]
description = "Run WGPU + SDL3 input/audio build"
run = "IW_INPUT_BACKEND=sdl3 ./ironwailgo-wgpu-sdl3 -basedir ${QUAKE_DIR}"

[tasks.build-gl]
depends = ["go-generate"]
description = "Build binary in OpenGL mode"
run = "go build -tags opengl,egl -o ironwailgo-gl ./cmd/ironwailgo"

[tasks.build-cgo]
depends = ["go-generate"]
description = "Build binary with CGO enabled (OpenGL renderer + oto audio + GLFW input)"
run = "CGO_ENABLED=1 go build -o ironwailgo-cgo ./cmd/ironwailgo"

[tasks.run-cgo]
depends = ["build-cgo"]
description = "Run CGO build (OpenGL + oto + GLFW)"
run = "./ironwailgo-cgo -basedir ${QUAKE_DIR}"

[tasks.parity-ref]
description = "Capture reference screenshots from C Ironwail"
run = "./scripts/parity_screenshots.sh reference"

[tasks.parity-go]
description = "Capture screenshots from Go port"
depends = ["build-gogpu"]
run = "./scripts/parity_screenshots.sh go"

[tasks.parity-compare]
description = "Compare reference vs Go screenshots"
run = "./scripts/parity_screenshots.sh compare"

[tasks.parity-all]
description = "Capture both and compare parity screenshots"
depends = ["build-gogpu"]
run = "./scripts/parity_screenshots.sh both"

[tasks.go-generate]
hide = true
description = "Run go generate (internal task)"
run = "go generate ./..."
